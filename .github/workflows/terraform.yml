name: "SOC2 コンプライアンス - Terraform"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_CLOUD_ORGANIZATION: "rikodao-org"
  TF_TOKEN_app_terraform_io: "${{ secrets.TF_API_TOKEN }}"

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Terraform セットアップ
        uses: hashicorp/setup-terraform@v3

      - name: フォーマットチェック
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: 初期化
        id: init
        run: terraform init

      - name: 構文検証
        id: validate
        run: terraform validate -no-color

      - name: Plan 実行
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: PR にコメント投稿
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Plan 結果

            #### フォーマット: \`${{ steps.fmt.outcome }}\`
            #### 初期化: \`${{ steps.init.outcome }}\`
            #### 構文検証: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Plan 出力</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            > **SOC2 備考**: この実行は Vault OIDC 動的認証を使用しています。
            > 静的な AWS キーはこのリポジトリおよび CI/CD パイプラインに保存されていません。

            *実行者: @${{ github.actor }}, アクション: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Apply 実行
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

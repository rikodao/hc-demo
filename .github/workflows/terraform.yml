name: "SOC2 Compliance - Terraform"

# HCP Terraform の VCS 連携が Plan/Apply/Sentinel を実行するため、
# GitHub Actions ではコードの静的チェックのみ行う。
on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-lint:
    name: "Terraform Lint & Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Comment on PR
        uses: actions/github-script@v7
        if: steps.fmt.outcome == 'failure'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Terraform Format Check Failed\n\nPlease run `terraform fmt` and push the formatted files.'
            })
